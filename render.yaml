services:
  - type: web
    name: resume-builder-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3001
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false

  - type: static
    name: resume-builder-web
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
